# Build and push a Docker image on every push to main (dev) or prod.
#
# Binary version: 2.0.<commit-count>  tag: <short-sha>  (auto-increments per commit)
# Image tags:     ghcr.io/netsepio/gateway:<full-sha>  (immutable)
#                 ghcr.io/netsepio/gateway:<branch>    (main or prod — deploy this)
#
# Deploy: copies deploy/docker-compose.yml + otel-collector-config.yaml to the
# server, pulls the branch image, and runs gateway + otel-collector via compose.

name: Docker publish

on:
  push:
    branches: [main, prod]

permissions:
  contents: read
  packages: write

jobs:
  build_push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        env:
          IMAGE: ghcr.io/netsepio/gateway
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          chmod +x scripts/docker-build.sh
          ./scripts/docker-build.sh --push

  deploy_dev:
    if: github.ref == 'refs/heads/main'
    needs: build_push
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Copy compose manifests to dev server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.AWS_REMOTE_SERVER_KEY }}
        run: |
          set -euo pipefail
          REMOTE_DIR="${GATEWAY_DIR_DEV:-gateway-dev}"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          SSH_OPTS=(-i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -p "${{ secrets.AWS_SSH_PORT }}")
          SSH_TARGET="${{ secrets.AWS_REMOTE_SERVER_USERNAME }}@${{ secrets.AWS_REMOTE_SERVER_ADDRESS }}"
          ssh "${SSH_OPTS[@]}" "$SSH_TARGET" "mkdir -p ~/${REMOTE_DIR}"
          scp "${SSH_OPTS[@]}" deploy/docker-compose.yml deploy/otel-collector-config.yaml \
            "${SSH_TARGET}:~/${REMOTE_DIR}/"

      - name: Deploy to dev (main branch)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_REMOTE_SERVER_ADDRESS }}
          username: ${{ secrets.AWS_REMOTE_SERVER_USERNAME }}
          key: ${{ secrets.AWS_REMOTE_SERVER_KEY }}
          port: ${{ secrets.AWS_SSH_PORT }}
          script: |
            set -euo pipefail
            GATEWAY_DIR="${GATEWAY_DIR_DEV:-$HOME/gateway-dev}"
            export GATEWAY_IMAGE=ghcr.io/netsepio/gateway:main
            export GATEWAY_CONTAINER_NAME=erebrus-gateway-dev
            export OTEL_CONTAINER_NAME=erebrus-otel-collector-dev
            export DEPLOY_ENVIRONMENT=staging
            export GATEWAY_HOST="${GATEWAY_HOST_DEV:-dev.gateway.erebrus.io}"

            if [[ ! -f "$GATEWAY_DIR/.env" ]]; then
              echo "Missing $GATEWAY_DIR/.env — create from .env.example before first deploy"
              exit 1
            fi

            cd "$GATEWAY_DIR"
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            docker compose pull
            docker compose up -d --remove-orphans

            for i in $(seq 1 30); do
              curl -fsS --max-time 2 http://127.0.0.1:8080/healthz && break
              sleep 1
            done

  deploy_prod:
    if: github.ref == 'refs/heads/prod'
    needs: build_push
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Copy compose manifests to prod server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.AWS_REMOTE_SERVER_KEY }}
        run: |
          set -euo pipefail
          REMOTE_DIR="${GATEWAY_DIR_PROD:-gateway-v2}"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          SSH_OPTS=(-i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -p "${{ secrets.AWS_SSH_PORT }}")
          SSH_TARGET="${{ secrets.AWS_REMOTE_SERVER_USERNAME }}@${{ secrets.AWS_REMOTE_SERVER_ADDRESS }}"
          ssh "${SSH_OPTS[@]}" "$SSH_TARGET" "mkdir -p ~/${REMOTE_DIR}"
          scp "${SSH_OPTS[@]}" deploy/docker-compose.yml deploy/otel-collector-config.yaml \
            "${SSH_TARGET}:~/${REMOTE_DIR}/"

      - name: Deploy to production (prod branch)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_REMOTE_SERVER_ADDRESS }}
          username: ${{ secrets.AWS_REMOTE_SERVER_USERNAME }}
          key: ${{ secrets.AWS_REMOTE_SERVER_KEY }}
          port: ${{ secrets.AWS_SSH_PORT }}
          script: |
            set -euo pipefail
            GATEWAY_DIR="${GATEWAY_DIR_PROD:-$HOME/gateway-v2}"
            export GATEWAY_IMAGE=ghcr.io/netsepio/gateway:prod
            export GATEWAY_CONTAINER_NAME=erebrus-gateway
            export OTEL_CONTAINER_NAME=erebrus-otel-collector
            export DEPLOY_ENVIRONMENT=production
            export GATEWAY_HOST="${GATEWAY_HOST_PROD:-gateway.erebrus.io}"

            if [[ ! -f "$GATEWAY_DIR/.env" ]]; then
              echo "Missing $GATEWAY_DIR/.env — create from .env.example before first deploy"
              exit 1
            fi

            cd "$GATEWAY_DIR"
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            docker compose pull
            docker compose up -d --remove-orphans

            for i in $(seq 1 30); do
              curl -fsS --max-time 2 http://127.0.0.1:8080/healthz && break
              sleep 1
            done

            if [[ -d /opt/erebrus ]]; then
              cd /opt/erebrus && docker compose restart || true
            fi