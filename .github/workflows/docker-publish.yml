# Build and push a Docker image on every push to main (dev) or prod.
#
# Binary version: 2.0.<commit-count>+<short-sha>  (auto-increments per commit)
# Image tags:     ghcr.io/netsepio/gateway:<full-sha>  (immutable)
#                 ghcr.io/netsepio/gateway:<branch>    (main or prod — deploy this)
#
# Deploy: main → dev gateway dir; prod → production gateway dir (SSH, same host).

name: Docker publish

on:
  push:
    branches: [main, prod]

permissions:
  contents: read
  packages: write

jobs:
  build_push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        env:
          IMAGE: ghcr.io/netsepio/gateway
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          chmod +x scripts/docker-build.sh
          ./scripts/docker-build.sh --push

  deploy_dev:
    if: github.ref == 'refs/heads/main'
    needs: build_push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to dev (main branch)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_REMOTE_SERVER_ADDRESS }}
          username: ${{ secrets.AWS_REMOTE_SERVER_USERNAME }}
          key: ${{ secrets.AWS_REMOTE_SERVER_KEY }}
          port: ${{ secrets.AWS_SSH_PORT }}
          script: |
            set -euo pipefail
            GATEWAY_DIR="${GATEWAY_DIR_DEV:-$HOME/gateway-dev}"
            CONTAINER_NAME=erebrus-gateway-dev
            IMAGE=ghcr.io/netsepio/gateway:main

            if [[ ! -f "$GATEWAY_DIR/.env" ]]; then
              echo "Missing $GATEWAY_DIR/.env — create from .env.example before first deploy"
              exit 1
            fi

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            docker pull "$IMAGE"
            docker rm -f "$CONTAINER_NAME" 2>/dev/null || true
            NET_ARGS=()
            if docker network inspect netsepio_prod_network >/dev/null 2>&1; then
              NET_ARGS=(--network netsepio_prod_network)
            fi
            docker run -d \
              --name "$CONTAINER_NAME" \
              --restart unless-stopped \
              "${NET_ARGS[@]}" \
              --env-file "$GATEWAY_DIR/.env" \
              -p 8080:8080 \
              "$IMAGE"

            for i in $(seq 1 30); do
              curl -fsS --max-time 2 http://127.0.0.1:8080/healthz && break
              sleep 1
            done

  deploy_prod:
    if: github.ref == 'refs/heads/prod'
    needs: build_push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to production (prod branch)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_REMOTE_SERVER_ADDRESS }}
          username: ${{ secrets.AWS_REMOTE_SERVER_USERNAME }}
          key: ${{ secrets.AWS_REMOTE_SERVER_KEY }}
          port: ${{ secrets.AWS_SSH_PORT }}
          script: |
            set -euo pipefail
            GATEWAY_DIR="${GATEWAY_DIR_PROD:-$HOME/gateway-v2}"
            CONTAINER_NAME=erebrus-gateway
            IMAGE=ghcr.io/netsepio/gateway:prod

            if [[ ! -f "$GATEWAY_DIR/.env" ]]; then
              echo "Missing $GATEWAY_DIR/.env — create from .env.example before first deploy"
              exit 1
            fi

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            docker pull "$IMAGE"
            docker rm -f "$CONTAINER_NAME" 2>/dev/null || true
            NET_ARGS=()
            if docker network inspect netsepio_prod_network >/dev/null 2>&1; then
              NET_ARGS=(--network netsepio_prod_network)
            fi
            docker run -d \
              --name "$CONTAINER_NAME" \
              --restart unless-stopped \
              "${NET_ARGS[@]}" \
              --env-file "$GATEWAY_DIR/.env" \
              -p 8080:8080 \
              "$IMAGE"

            for i in $(seq 1 30); do
              curl -fsS --max-time 2 http://127.0.0.1:8080/healthz && break
              sleep 1
            done

            if [[ -d /opt/erebrus ]]; then
              cd /opt/erebrus && docker compose restart || true
            fi