name: ci

on:
  push:
    branches: [main, prod, v2]
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./...
      # advisory until the v2 re-layout lands (Phase 3), then make blocking
      - uses: golangci/golangci-lint-action@v6
        continue-on-error: true
        with:
          version: latest

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
