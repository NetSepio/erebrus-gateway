name: Build and Deploy Gateway v2

on:
  push:
    branches: [v2]
  workflow_dispatch:

jobs:
  build_push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push v2 image
        run: |
          IMAGE=ghcr.io/netsepio/gateway
          TAG=v2
          SHA_TAG="${IMAGE}:${GITHUB_SHA}"
          BRANCH_TAG="${IMAGE}:${TAG}"
          docker build -f Dockerfile --build-arg version="${GITHUB_SHA}" -t "$SHA_TAG" -t "$BRANCH_TAG" .
          docker push "$SHA_TAG"
          docker push "$BRANCH_TAG"

  deploy:
    needs: build_push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy v2 gateway + restart node
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_REMOTE_SERVER_ADDRESS }}
          username: ${{ secrets.AWS_REMOTE_SERVER_USERNAME }}
          key: ${{ secrets.AWS_REMOTE_SERVER_KEY }}
          port: ${{ secrets.AWS_SSH_PORT }}
          script: |
            set -euo pipefail
            GATEWAY_DIR="${GATEWAY_DIR:-$HOME/gateway-v2}"
            CONTAINER_NAME=erebrus-gateway-v2
            IMAGE=ghcr.io/netsepio/gateway:v2

            mkdir -p "$GATEWAY_DIR"
            if [[ ! -f "$GATEWAY_DIR/.env" ]]; then
              echo "Missing $GATEWAY_DIR/.env on server — create it before first v2 deploy"
              exit 1
            fi

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            docker pull "$IMAGE"
            docker rm -f "$CONTAINER_NAME" 2>/dev/null || true
            NET_ARGS=()
            if docker network inspect netsepio_prod_network >/dev/null 2>&1; then
              NET_ARGS=(--network netsepio_prod_network)
            fi
            docker run -d \
              --name "$CONTAINER_NAME" \
              --restart unless-stopped \
              "${NET_ARGS[@]}" \
              --env-file "$GATEWAY_DIR/.env" \
              -p 8080:8080 \
              "$IMAGE"

            for i in $(seq 1 30); do
              curl -fsS --max-time 2 http://127.0.0.1:8080/healthz && break
              sleep 1
            done

            curl -fsS http://127.0.0.1:8080/api/v2/nodes || true

            if [[ -d /opt/erebrus ]]; then
              cd /opt/erebrus
              docker compose restart || true
            fi

            curl -fsS http://127.0.0.1:8080/api/v2/nodes || true