# gitleaks config — Erebrus gateway
# Uses the default gitleaks ruleset; this file only adds allowlists.
[extend]
useDefault = true

[allowlist]
description = "templates, docs, dev compose defaults, and removed legacy env sample"
paths = [
  '''\.env\.example$''',
  '''\.env-sample$''',
  '''docs/.*''',
  '''docker-compose\.yml$''',
  '''internal/.+_test\.go$''',
]